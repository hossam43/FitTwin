<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX GYM — Progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/typography.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/pages/progress.css" />
</head>
<body>

  <nav id="navbar" class="navbar">
    <a href="../index.html" class="navbar__logo">APEX<span>GYM</span></a>
    <ul class="navbar__links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="coaches.html">Coaches</a></li>
      <li><a href="plan.html">My Plan</a></li>
      <li><a href="avatar.html">3D Avatar</a></li>
      <li><a href="progress.html" class="active">Progress</a></li>
    </ul>
    <a href="plan.html" class="btn btn--primary">Get Started</a>
  </nav>

  <main class="page-shell">
    <div class="container">

      <div class="page-header">
        <p class="eyebrow">Track Your Journey</p>
        <h1 class="section-title">Your <span>Progress</span></h1>
      </div>

      <!-- Stats Row -->
      <div class="stats-row" id="statsRow">
        <!-- Populated by progress.js -->
      </div>

      <!-- Achievements -->
      <section class="progress-section">
        <h2 class="progress-section__title">Achievements</h2>
        <div class="badges-grid" id="badgesGrid">
          <!-- Populated by progress.js -->
        </div>
      </section>

      <!-- Workout Log -->
      <section class="progress-section">
        <h2 class="progress-section__title">Workout Log</h2>
        <div class="log-list" id="workoutLog">
          <!-- Populated by progress.js -->
        </div>
        <button class="btn btn--ghost" id="logWorkoutBtn" style="margin-top:var(--space-4)">
          + Log Today's Workout
        </button>
      </section>

      <!-- Weekly Challenge -->
      <section class="progress-section">
        <h2 class="progress-section__title">Weekly Challenge</h2>
        <div class="challenge-card" id="challengeCard">
          <!-- Populated by progress.js -->
        </div>
      </section>

    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer__logo">APEX<span>GYM</span></p>
      <p class="footer__copy">© 2026 ApexGym. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/utils/helpers.js"></script>
  <script src="../js/core/state.js"></script>
  <script src="../js/components/navbar.js"></script>
  <script src="../js/pages/progress.js"></script>
</body>
</html>
